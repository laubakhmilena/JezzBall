<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#fff3ea">
  <title>JezzBall</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-root" id="gameRoot" aria-label="Экран игры JezzBall">
    <section class="start-screen screen is-active" id="start-screen" aria-labelledby="gameTitle">
      <div class="background-bloom" aria-hidden="true"></div>

      <div class="start-content">
        <h1 class="game-title" id="gameTitle">JezzBall</h1>

        <nav class="menu-actions" aria-label="Главное меню">
          <button class="menu-button play-button" type="button" id="playButton">Играть</button>
          <button class="menu-button settings-button" type="button" id="settingsButton">
            <svg class="settings-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path fill="currentColor" d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.1-1.64c.19-.15.24-.42.12-.64l-1.99-3.45a.5.5 0 0 0-.61-.22l-2.47 1a7.2 7.2 0 0 0-1.7-.98l-.37-2.63A.5.5 0 0 0 14.01 2h-4a.5.5 0 0 0-.5.42L9.14 5.05c-.61.24-1.18.57-1.7.98l-2.47-1a.5.5 0 0 0-.61.22L2.37 8.7a.5.5 0 0 0 .12.64l2.1 1.64c-.05.32-.08.65-.08.99s.03.67.08.99l-2.1 1.64a.5.5 0 0 0-.12.64l1.99 3.45c.13.22.39.31.61.22l2.47-1c.52.4 1.09.73 1.7.98l.37 2.63c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.63c.61-.25 1.18-.58 1.7-.98l2.47 1c.22.09.48 0 .61-.22l1.99-3.45a.5.5 0 0 0-.12-.64l-2.1-1.64ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/>
            </svg>
            <span>Настройки</span>
          </button>
        </nav>
      </div>
    </section>

    <section class="map-screen screen" id="map-screen" aria-label="Карта уровней" aria-hidden="true">
      <button class="back-button" type="button" id="backButton" aria-label="Назад">
        <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M14.7 5.3a1 1 0 0 1 0 1.4L10.42 11H19a1 1 0 1 1 0 2h-8.58l4.28 4.3a1 1 0 1 1-1.4 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.4 0Z"/>
        </svg>
      </button>

      <div class="map-viewport" id="mapViewport" aria-label="Путь уровней">
        <div class="map-track" id="mapTrack">
          <div class="sky-ribbons" aria-hidden="true"></div>
          <div class="chapter-layer" id="chapterLayer" aria-hidden="true"></div>
          <div class="decor-layer decor-layer-back" id="decorBack" aria-hidden="true"></div>
          <svg class="road-svg" id="roadSvg" viewBox="0 0 720 12000" preserveAspectRatio="none" aria-hidden="true">
            <defs>
              <linearGradient id="roadGradient" x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%" stop-color="#ffe8b8"/>
                <stop offset="14%" stop-color="#ffd6ba"/>
                <stop offset="25%" stop-color="#e4d3ff"/>
                <stop offset="36%" stop-color="#bff3d6"/>
                <stop offset="48%" stop-color="#bfefff"/>
                <stop offset="59%" stop-color="#92e5ff"/>
                <stop offset="70%" stop-color="#95a2ff"/>
                <stop offset="82%" stop-color="#cfc7ff"/>
                <stop offset="91%" stop-color="#ffc494"/>
                <stop offset="100%" stop-color="#fff27a"/>
              </linearGradient>
            </defs>
            <path class="road-shadow" id="roadShadow"></path>
            <path class="road-main" id="roadMain"></path>
            <path class="road-highlight" id="roadHighlight"></path>
          </svg>
          <div class="decor-layer decor-layer-front" id="decorFront" aria-hidden="true"></div>
          <div class="level-layer" id="levelLayer" aria-label="Уровни"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="sсript.js"></script>
</body>
</html>
