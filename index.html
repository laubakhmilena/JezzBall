<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#160b3a">
  <title>JezzBall - карта глав</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-root" id="gameRoot" aria-label="Экран игры JezzBall">
    <section class="start-screen screen is-active" id="main-menu" aria-labelledby="gameTitle">
      <div class="start-content">
        <h1 class="game-title" id="gameTitle">JezzBall</h1>
        <p class="game-subtitle">Проведи линию. <span>Захвати пространство.</span></p>
        <nav class="menu-actions" aria-label="Главное меню">
          <button class="menu-button play-button" type="button" id="playButton">
            <span class="play-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path fill="currentColor" d="M8 5.7c0-.78.86-1.25 1.52-.82l9.1 5.78c.61.39.61 1.29 0 1.68l-9.1 5.78A.98.98 0 0 1 8 17.3V5.7Z"/>
              </svg>
            </span>
            <span>Играть</span>
          </button>
        </nav>
      </div>
    </section>

    <section class="chapter-screen chapter-1 screen" id="chapter-1-screen" data-chapter="1" aria-hidden="true"></section>
    <section class="chapter-screen chapter-2 screen" id="chapter-2-screen" data-chapter="2" aria-hidden="true"></section>
    <section class="chapter-screen chapter-3 screen" id="chapter-3-screen" data-chapter="3" aria-hidden="true"></section>
    <section class="chapter-screen chapter-4 screen" id="chapter-4-screen" data-chapter="4" aria-hidden="true"></section>
    <section class="chapter-screen chapter-5 screen" id="chapter-5-screen" data-chapter="5" aria-hidden="true"></section>
    <section class="chapter-screen chapter-6 screen" id="chapter-6-screen" data-chapter="6" aria-hidden="true"></section>
    <section class="chapter-screen chapter-7 screen" id="chapter-7-screen" data-chapter="7" aria-hidden="true"></section>
    <section class="chapter-screen chapter-8 screen" id="chapter-8-screen" data-chapter="8" aria-hidden="true"></section>
    <section class="chapter-screen chapter-9 screen" id="chapter-9-screen" data-chapter="9" aria-hidden="true"></section>
    <section class="chapter-screen chapter-10 screen" id="chapter-10-screen" data-chapter="10" aria-hidden="true"></section>

    <section class="level-screen screen" id="level-screen" aria-label="Экран уровня" aria-hidden="true">
      <div class="chapter-scene level-scene">
        <header class="top-ui" aria-label="Верхняя панель">
          <button class="icon-button back-button" type="button" data-action="return-chapter" aria-label="Назад к главе">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 0 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.42 0Z"/></svg>
          </button>
          <div class="resource-strip" aria-label="Ресурсы">
            <div class="resource-pill resource-counter coins-pill" aria-label="Монеты"><span class="resource-icon" aria-hidden="true">●</span><span data-resource="coins">0</span></div>
            <div class="resource-pill resource-counter lives-pill" aria-label="Жизни"><span class="resource-icon" aria-hidden="true">♥</span><span data-resource="lives">5</span></div>
            <button class="resource-pill achievement-button" type="button" data-action="achievements" aria-label="Достижения"><span class="resource-icon" aria-hidden="true">★</span><span data-resource="achievements">0</span></button>
          </div>
          <button class="icon-button settings-button" type="button" data-action="settings" aria-label="Настройки">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.3 7.3 0 0 0-1.69-.98L14.5 2.42A.5.5 0 0 0 14 2h-4a.5.5 0 0 0-.49.42L9.13 5.07c-.61.24-1.18.56-1.69.98l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65a7.9 7.9 0 0 0 0 1.96l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46c.13.23.4.32.64.22l2.49-1c.51.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.49.42h4c.24 0 .45-.18.49-.42l.38-2.65c.61-.24 1.18-.56 1.69-.98l2.49 1c.24.1.51.01.64-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.18-1.65ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg>
          </button>
        </header>

        <div class="level-playfield" id="levelPlayfield">
          <div class="level-hud" aria-label="Цель уровня">
            <div>
              <span id="levelChapterLabel">Глава 1</span>
              <strong id="levelTitle">Уровень 1</strong>
            </div>
            <div class="level-stat">
              <span>Захват</span>
              <strong id="capturePercent">0%</strong>
            </div>
            <div class="level-stat">
              <span>Штрафы</span>
              <strong id="penaltyCount">0</strong>
            </div>
            <div class="level-stat">
              <span>Цель</span>
              <strong id="targetPercent">60%</strong>
            </div>
          </div>
          <canvas class="jezz-canvas" id="jezzCanvas" aria-label="Игровое поле JezzBall"></canvas>
          <div class="level-toast" id="levelToast" aria-live="polite"></div>
          <div class="level-complete-panel" id="levelCompletePanel" aria-hidden="true">
            <span>Уровень пройден</span>
            <strong id="levelCompleteScore">60%</strong>
            <button class="menu-button play-button compact-play" type="button" id="completeLevelButton">Продолжить</button>
          </div>
        </div>
      </div>
    </section>

    <section class="final-screen screen" id="final-screen" aria-label="Финал" aria-hidden="true">
      <div class="chapter-scene final-scene">
        <header class="top-ui" aria-label="Верхняя панель">
          <button class="icon-button back-button" type="button" data-action="return-chapter" aria-label="Назад к главе">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 0 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.42 0Z"/></svg>
          </button>
          <div class="resource-strip" aria-label="Ресурсы">
            <div class="resource-pill resource-counter coins-pill" aria-label="Монеты"><span class="resource-icon" aria-hidden="true">●</span><span data-resource="coins">0</span></div>
            <div class="resource-pill resource-counter lives-pill" aria-label="Жизни"><span class="resource-icon" aria-hidden="true">♥</span><span data-resource="lives">5</span></div>
            <button class="resource-pill achievement-button" type="button" data-action="achievements" aria-label="Достижения"><span class="resource-icon" aria-hidden="true">★</span><span data-resource="achievements">0</span></button>
          </div>
          <button class="icon-button settings-button" type="button" data-action="settings" aria-label="Настройки">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M19.43 12.98c.04-.32.07-.65.07-.98s-.02-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.6-.22l-2.49 1a7.3 7.3 0 0 0-1.69-.98L14.5 2.42A.5.5 0 0 0 14 2h-4a.5.5 0 0 0-.49.42L9.13 5.07c-.61.24-1.18.56-1.69.98l-2.49-1a.5.5 0 0 0-.6.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65a7.9 7.9 0 0 0 0 1.96l-2.11 1.65a.5.5 0 0 0-.12.64l2 3.46c.13.23.4.32.64.22l2.49-1c.51.4 1.08.73 1.69.98l.38 2.65c.04.24.25.42.49.42h4c.24 0 .45-.18.49-.42l.38-2.65c.61-.24 1.18-.56 1.69-.98l2.49 1c.24.1.51.01.64-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.18-1.65ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg>
          </button>
        </header>
        <div class="final-card">
          <span>Финал открыт</span>
          <h2>Врата света пройдены</h2>
          <button class="menu-button play-button compact-play" type="button" data-action="main-menu">В меню</button>
        </div>
      </div>
    </section>

    <div class="settings-modal" id="settingsModal" aria-hidden="true">
      <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <button class="icon-button settings-close" type="button" data-action="close-settings" aria-label="Закрыть настройки">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M6.7 5.3 12 10.59l5.3-5.3a1 1 0 1 1 1.4 1.42L13.41 12l5.3 5.3a1 1 0 0 1-1.42 1.4L12 13.41l-5.3 5.3a1 1 0 0 1-1.4-1.42L10.59 12l-5.3-5.3A1 1 0 1 1 6.7 5.3Z"/></svg>
        </button>
        <h2 id="settingsTitle">Настройки</h2>
        <label class="toggle-row">
          <span>Музыка</span>
          <input type="checkbox" id="musicToggle" checked>
        </label>
        <label class="toggle-row">
          <span>Звуки</span>
          <input type="checkbox" id="soundToggle" checked>
        </label>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
